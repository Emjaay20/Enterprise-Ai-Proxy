name: Deploy to Oracle VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/sentinel-proxy/Enterprise-Ai-Proxy/ai-gateway
            git pull origin main
            npm install --legacy-peer-deps
            npm run build
            pm2 restart sentinel-gateway || pm2 start dist/server.js --name "sentinel-gateway"
            pm2 save
